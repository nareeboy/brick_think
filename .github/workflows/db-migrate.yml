name: DB migrate

# Applies supabase/migrations/* to the right Supabase project on merge.
#
#   main    -> production project (wreypwrvfpzjyijpyhkb), behind the
#              `production` GitHub Environment approval gate.
#   staging -> shared non-prod project (fzlyvqcwjadpmrgprfov), auto.
#   test    -> shared non-prod project (fzlyvqcwjadpmrgprfov), auto.
#
# test and staging share ONE Supabase project, so a push to either branch
# re-runs `supabase db push` against the same DB (idempotent — already-applied
# migrations are skipped).
#
# PREMIUM OVERLAY: the paid-feature migrations (session_reports, brand_profiles,
# billing) live in the private @brickthink/premium overlay, not in this repo.
# Before pushing, we run scripts/bootstrap-premium.mjs, which clones the overlay
# and copies its supabase/migrations/* into the checkout so the full schema is
# pushed and remote migration history stays consistent. The step is INERT when
# PREMIUM_OVERLAY_TOKEN/REPO are unset (self-host forks just push the core
# migrations). Those 7 migrations are already applied on prod + non-prod, so the
# push skips them today; the step matters for any FUTURE premium migration.
#
# Connection: we push via the project's Session Pooler URL (--db-url), NOT
# `supabase link` + direct connection. Supabase direct connections
# (db.<ref>.supabase.co:5432) are IPv6-only, and GitHub-hosted runners have
# no IPv6 — `supabase db push --linked` fails with "IPv6 is not supported on
# your current network". The Session Pooler (aws-<n>-<region>.pooler.supabase.com:5432)
# is IPv4. Same rationale as WORKER_DATABASE_URL in CLAUDE.md.
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions) —
# each is a full Session Pooler connection string (port 5432, password embedded):
#   SUPABASE_DB_URL_NONPROD   pooler URL for fzlyvqcwjadpmrgprfov
#   SUPABASE_DB_URL_PROD      pooler URL for wreypwrvfpzjyijpyhkb
# Premium overlay secrets (same fine-grained PAT used on Railway — Contents:read
# on brick_think-premium):
#   PREMIUM_OVERLAY_REPO      https://github.com/nareeboy/brick_think-premium.git
#   PREMIUM_OVERLAY_TOKEN     the read-only PAT
#   (PREMIUM_OVERLAY_REF defaults to `main` in the script if unset.)
#
# The `production` Environment (Settings -> Environments) must have
# "Required reviewers" enabled — that is the approval gate. Without it the
# prod job would run unattended, which violates the no-autonomous-prod-push
# rule in CLAUDE.md.

on:
  push:
    branches: [main, staging, test]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-nonprod:
    name: Push migrations (test/staging)
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Apply premium overlay migrations (inert without secrets)
        run: node scripts/bootstrap-premium.mjs
        env:
          PREMIUM_OVERLAY_REPO: ${{ secrets.PREMIUM_OVERLAY_REPO }}
          PREMIUM_OVERLAY_TOKEN: ${{ secrets.PREMIUM_OVERLAY_TOKEN }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations (via IPv4 session pooler)
        # --include-all: apply pending migrations even when a newer-timestamped
        # one is already on the remote (out-of-order merges across branches).
        run: supabase db push --include-all --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_NONPROD }}

  migrate-prod:
    name: Push migrations (production)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # approval gate — required reviewers must approve
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Apply premium overlay migrations (inert without secrets)
        run: node scripts/bootstrap-premium.mjs
        env:
          PREMIUM_OVERLAY_REPO: ${{ secrets.PREMIUM_OVERLAY_REPO }}
          PREMIUM_OVERLAY_TOKEN: ${{ secrets.PREMIUM_OVERLAY_TOKEN }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations (via IPv4 session pooler)
        # --include-all: apply pending migrations even when a newer-timestamped
        # one is already on the remote (out-of-order merges across branches).
        run: supabase db push --include-all --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PROD }}
